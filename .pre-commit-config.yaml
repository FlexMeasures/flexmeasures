repos:
  - repo: local
    hooks:
      - id: flake8
        name: flake8 (code linting)
        language: system
        entry: uv run flake8
        types: [python]
  - repo: local
    hooks:
      - id: black
        name: black (code formatting)
        language: system
        entry: uv run black
        types: [python]
  - repo: local
    hooks:
      - id: mypy
        name: mypy (static typing)
        pass_filenames: false
        language: system
        entry: uv run poe type-check
        verbose: true
  - repo: local
    hooks:
      - id: generate-openapi-specs
        name: Generate OpenAPI specs
        files: '^flexmeasures/api|^flexmeasures/data/schemas'
        pass_filenames: false
        language: system
        entry: bash -c '[[ "$GITHUB_ACTIONS" == "true" ]] && exit 0 || (uv run poe generate-open-api-specs)'
  - repo: local
    hooks:
      - id: no-image-files
        name: Block image files from being committed
        language: fail
        entry: >-
          Image files must not be committed to this repo (they bloat .git forever).
          Put screenshots in the FlexMeasures/screenshots repo, or leave them
          untracked and attach them to the PR/issue manually.
        files: '\.(png|jpe?g|gif|bmp|tiff?|webp|ico|psd)$'
        exclude: '^(flexmeasures/ui/static/|documentation/)'
