# Composite action: installs system dependencies, checks out code,
# loads psql extensions and installs FlexMeasures for testing.
#
# The caller is responsible for declaring the postgres (and, for the Copilot
# agent, redis) service container(s) before calling this action.
# PG* connection variables default to the standard test configuration
# (127.0.0.1:5432, user/db/password = flexmeasures_test) but can be
# overridden via the calling job's env: block.

name: "Setup FlexMeasures test environment"
description: >
  Sets up a reproducible Python + PostgreSQL test environment for FlexMeasures.
  Call this from any job that already has a postgres service container running.

inputs:
  python-version:
    description: "Python version to set up (e.g. '3.12')"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}
        version: 0.10

    - name: Get history and tags for SCM versioning to work
      shell: bash
      run: |
        git fetch --prune --unshallow || true
        git fetch --depth=1 origin +refs/tags/*:refs/tags/*

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get -y --no-install-recommends install libpq-dev coinor-cbc postgresql-client

    - name: Load PostgreSQL extensions
      shell: bash
      run: |
        psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDB" \
             -f ci/load-psql-extensions.sql
      env:
        PGHOST: ${{ env.PGHOST || '127.0.0.1' }}
        PGPORT: ${{ env.PGPORT || '5432' }}
        PGUSER: ${{ env.PGUSER || 'flexmeasures_test' }}
        PGDB: ${{ env.PGDB || 'flexmeasures_test' }}
        PGPASSWORD: ${{ env.PGPASSWORD || 'flexmeasures_test' }}

    - name: Install FlexMeasures & dependencies
      shell: bash
      run: uv sync --locked --group test --group dev
