
# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      - name: Build release distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      url: https://pypi.org/project/flexmeasures

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  pypi-smoke-test:
    runs-on: ubuntu-latest
    needs:
      - pypi-publish
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Wait for PyPI to index the release
        run: sleep 60

      - name: Install from PyPI in a fresh venv
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/fm-smoke-venv
          /tmp/fm-smoke-venv/bin/pip install --no-cache-dir "flexmeasures==${VERSION}"

      - name: Verify installed version and importability
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /tmp/fm-smoke-venv/bin/python -c "
          from flexmeasures import __version__
          expected = '${VERSION}'
          assert __version__ == expected, f'expected {expected}, got {__version__}'
          print(f'OK: flexmeasures {__version__} importable and version matches')
          "
